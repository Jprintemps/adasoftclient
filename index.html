<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard CEO - Adasoft</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuration Tailwind personnalisée -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        app: {
                            bg: '#0D0B0A',      
                            card: '#141110',    
                            border: '#2A2422',  
                            muted: '#A39995',   
                            accent: '#E55812',  
                        }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-card { animation: fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-app-bg text-white min-h-screen w-full overflow-x-hidden antialiased selection:bg-app-accent selection:text-white pb-16">

    <!-- Header Global -->
    <nav class="w-full border-b border-app-border bg-app-bg/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center">
            <!-- Tentative de chargement de l'image locale -->
            <img src="Fichier 4.png" alt="Adasoft Logo" id="logo-img" class="h-10 object-contain" onerror="document.getElementById('logo-img').classList.add('hidden'); document.getElementById('logo-fallback').classList.remove('hidden'); document.getElementById('logo-fallback').classList.add('flex');">
            
            <!-- Fallback en HTML/SVG si l'image n'est pas trouvée (ex: dans l'aperçu web) -->
            <div id="logo-fallback" class="hidden items-center gap-3">
                <svg viewBox="0 0 100 100" class="w-9 h-9 text-[#E6E6E6]">
                    <path d="M 22 75 C 35 20, 65 20, 78 75" stroke="currentColor" stroke-width="15" stroke-linecap="round" fill="none" />
                    <circle cx="50" cy="72" r="8.5" fill="currentColor" />
                </svg>
                <div class="flex flex-col justify-center">
                    <span class="text-[24px] font-bold tracking-tight leading-none text-[#E6E6E6] lowercase">adasoft</span>
                    <span class="text-[10px] font-normal text-app-muted tracking-wide mt-1">Where design meets brand strategy.</span>
                </div>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <!-- Indicateur de synchronisation Cloud -->
            <div id="sync-status" class="text-xs font-medium text-app-muted flex items-center gap-2 px-3 py-1.5 rounded-full bg-app-card border border-app-border/50 hidden md:flex">
                <div class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse" id="sync-dot"></div>
                <span id="sync-text">Connexion...</span>
            </div>

            <!-- Bouton Sauvegarder Manuellement -->
            <button id="btn-save-all" class="flex items-center gap-2 bg-app-card text-white border border-app-border px-4 py-2 rounded-full text-sm font-semibold hover:bg-app-border hover:text-app-accent transition-colors shadow-lg active:scale-95">
                <i data-lucide="save" class="w-4 h-4"></i>
                Enregistrer
            </button>

            <!-- Bouton Nouveau Client -->
            <button id="btn-add-client" class="flex items-center gap-2 bg-white text-black px-4 py-2 rounded-full text-sm font-semibold hover:bg-gray-200 transition-colors shadow-lg active:scale-95">
                <i data-lucide="plus" class="w-4 h-4"></i>
                Nouveau
            </button>
        </div>
    </nav>

    <!-- Container Principal -->
    <main class="w-full max-w-[1600px] mx-auto p-6 md:p-8">
        <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Les cartes générées apparaîtront ici -->
        </div>
    </main>

    <!-- MODÈLE CACHÉ (Template) -->
    <template id="card-template">
        <article class="w-full p-8 bg-app-card rounded-[2rem] border border-app-border shadow-[0_10px_50px_rgba(0,0,0,0.5)] relative animate-card opacity-0">
            <div class="absolute -top-20 -left-20 w-40 h-40 bg-app-accent/15 rounded-full blur-[64px] pointer-events-none"></div>

            <header class="flex justify-between items-start mb-12">
                <div class="flex flex-col gap-1 w-full mr-4">
                    <input type="text" value="" placeholder="NOM DU CLIENT" class="js-input-client text-app-muted text-xs font-semibold tracking-widest uppercase bg-transparent border-b border-transparent hover:border-app-border focus:border-app-accent focus:outline-none transition-colors w-full pb-1">
                    <input type="text" value="Avril 2026" placeholder="Mois" class="js-input-month text-xl font-medium tracking-tight bg-transparent border-b border-transparent hover:border-app-border focus:border-app-accent focus:outline-none transition-colors w-full pb-1">
                </div>
                <button class="js-btn-delete w-10 h-10 rounded-full bg-app-bg border border-app-border flex items-center justify-center shadow-inner shrink-0 transition-all text-app-muted hover:text-red-500 hover:bg-red-500/10 hover:border-red-500/50 cursor-pointer" title="Masquer ce dashboard">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
            </header>

            <section class="mb-12">
                <h2 class="text-app-muted text-sm font-medium mb-3">Affiches terminées</h2>
                <div class="flex items-center gap-6">
                    <span class="text-8xl font-bold tracking-tighter tabular-nums js-val-done">0</span>
                    <div class="flex flex-col gap-2">
                        <button class="js-btn-add w-10 h-10 rounded-full bg-app-card border border-app-border flex items-center justify-center text-app-muted hover:text-white hover:border-app-accent hover:bg-app-accent/10 transition-all cursor-pointer">
                            <i data-lucide="plus" class="w-5 h-5"></i>
                        </button>
                        <button class="js-btn-sub w-10 h-10 rounded-full bg-app-card border border-app-border flex items-center justify-center text-app-muted hover:text-white hover:border-red-500/50 hover:bg-red-500/10 transition-all cursor-pointer">
                            <i data-lucide="minus" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </section>

            <section class="mb-10">
                <div class="flex justify-between items-end mb-3">
                    <div class="flex items-center gap-2">
                        <span class="text-app-accent text-lg font-semibold tracking-tight js-val-percent">0%</span>
                        <span class="text-app-muted text-sm">complété</span>
                    </div>
                    <div class="text-right flex items-center justify-end gap-1">
                        <span class="text-app-muted text-sm">Objectif :</span>
                        <input type="number" value="30" min="1" class="js-input-target w-10 bg-transparent text-white font-medium text-right border-b border-transparent hover:border-app-border focus:border-app-accent focus:outline-none transition-colors [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                    </div>
                </div>
                
                <div class="w-full h-2 bg-app-bg rounded-full overflow-hidden border border-app-border/50">
                    <div class="js-progress-fill h-full bg-app-accent rounded-full w-0 transition-[width] duration-1000 ease-out relative">
                        <div class="absolute right-0 top-0 bottom-0 w-4 bg-gradient-to-r from-transparent to-white/30"></div>
                    </div>
                </div>
            </section>

            <div class="h-px w-full bg-gradient-to-r from-transparent via-app-border to-transparent mb-8"></div>

            <section class="flex items-center justify-between p-5 bg-app-bg/50 rounded-2xl border border-app-border/40 backdrop-blur-sm group hover:border-app-border transition-colors">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full border border-app-border bg-app-card flex items-center justify-center text-app-muted group-hover:text-white transition-colors">
                        <i data-lucide="target" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-app-muted text-sm font-medium">Reste à produire</p>
                    </div>
                </div>
                <span class="text-3xl font-semibold tracking-tight tabular-nums js-val-remaining">30</span>
            </section>
        </article>
    </template>

    <script>
        // =========================================================================
        // 🚨 ATTENTION : COLLEZ VOTRE URL MAGIQUE GOOGLE APPS SCRIPT ICI
        // Utilisez les backticks (`) autour du lien pour éviter les erreurs de syntaxe
        // =========================================================================
        const API_URL = `VOTRE_URL_APPLICATION_WEB_ICI`; 
        
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const container = document.getElementById('cards-container');
            const template = document.getElementById('card-template');
            
            // --- GESTION DE L'INTERFACE DE SYNCHRONISATION ---
            const syncText = document.getElementById('sync-text');
            const syncDot = document.getElementById('sync-dot');

            function setSyncStatus(status) {
                if (status === 'syncing') {
                    syncText.textContent = 'Sauvegarde...';
                    syncDot.className = 'w-2 h-2 rounded-full bg-yellow-500 animate-pulse';
                } else if (status === 'success') {
                    syncText.textContent = 'À jour';
                    syncDot.className = 'w-2 h-2 rounded-full bg-green-500';
                } else if (status === 'error') {
                    syncText.textContent = 'Hors ligne';
                    syncDot.className = 'w-2 h-2 rounded-full bg-red-500';
                }
            }

            // Utilitaires : Empêcher d'envoyer 10 requêtes si on clique vite
            function debounce(func, wait) {
                let timeout;
                return function(...args) {
                    clearTimeout(timeout);
                    timeout = setTimeout(() => func.apply(this, args), wait);
                };
            }

            // Utilitaire : Convertir les dates brutes de Google Sheets en texte propre (ex: "Avril 2026")
            function formatMonthString(val) {
                if (!val) return "Mois";
                // On vérifie si la valeur ressemble à un format de date ISO "2026-03-31T21:00:00.000Z"
                if (typeof val === 'string' && val.includes('T') && val.includes('Z')) {
                    const dateObj = new Date(val);
                    if (!isNaN(dateObj.getTime())) {
                        // On formate la date proprement
                        const formatter = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' });
                        const formatted = formatter.format(dateObj);
                        // On met la première lettre en majuscule
                        return formatted.charAt(0).toUpperCase() + formatted.slice(1);
                    }
                }
                // Si c'est déjà du texte normal tapé par l'utilisateur, on le retourne tel quel
                return val;
            }

            // --- FONCTION MAÎTRESSE : CRÉATION D'UNE CARTE ---
            function createClientDashboard(initialId = "", initialClientName = "", initialDone = 0, initialTarget = 30, initialMonth = "Avril 2026") {
                const clone = template.content.cloneNode(true);
                const card = clone.querySelector('article');
                
                // Générer un ID unique si c'est une nouvelle carte
                const cardId = initialId || 'CLI-' + new Date().getTime();
                card.dataset.id = cardId;

                const inputClient = card.querySelector('.js-input-client');
                const inputMonth = card.querySelector('.js-input-month');
                const inputTarget = card.querySelector('.js-input-target');
                const valDone = card.querySelector('.js-val-done');
                const valRemaining = card.querySelector('.js-val-remaining');
                const valPercent = card.querySelector('.js-val-percent');
                const progressFill = card.querySelector('.js-progress-fill');
                
                const btnAdd = card.querySelector('.js-btn-add');
                const btnSub = card.querySelector('.js-btn-sub');
                const btnDelete = card.querySelector('.js-btn-delete');

                let targetPosters = parseInt(initialTarget) || 30;
                let donePosters = parseInt(initialDone) || 0;
                
                inputClient.value = initialClientName;
                inputMonth.value = formatMonthString(initialMonth); // Formatage de la date appliqué ici !
                inputTarget.value = targetPosters;

                function updateUI() {
                    const remaining = Math.max(0, targetPosters - donePosters);
                    let percent = targetPosters > 0 ? Math.round((donePosters / targetPosters) * 100) : 0;
                    if (percent > 100) percent = 100;

                    valDone.textContent = donePosters;
                    valRemaining.textContent = remaining;
                    valPercent.textContent = percent + '%';
                    progressFill.style.width = percent + '%';
                }

                // ☁️ --- SAUVEGARDE DANS GOOGLE SHEETS --- ☁️
                const saveToCloud = debounce(() => {
                    if (API_URL === "Vhttps://script.google.com/macros/s/AKfycbxrHNApsIPcjh-dyadssqx-ET29YXeAVK7HU6Zoygs2GqIqdS_cDnwWjw3rmAIwKuyg/exec") return; // On ne fait rien si l'URL n'est pas mise
                    
                    setSyncStatus('syncing');

                    const dataToSend = {
                        id: cardId,
                        mois: inputMonth.value,
                        client: inputClient.value,
                        objectif: targetPosters,
                        terminees: donePosters
                    };

                    // Requête POST vers Google Apps Script
                    fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' }, 
                        body: JSON.stringify(dataToSend)
                    })
                    .then(response => response.json())
                    .then(data => {
                        setSyncStatus('success');
                    })
                    .catch(error => {
                        console.error("Erreur de sauvegarde :", error);
                        setSyncStatus('error');
                    });
                }, 1000); // Attend 1 seconde après la dernière action avant de sauvegarder

                // --- GESTION DES ÉVÉNEMENTS (DÉCLENCHENT LA SAUVEGARDE) ---
                inputTarget.addEventListener('input', (e) => {
                    let newVal = parseInt(e.target.value);
                    targetPosters = (!isNaN(newVal) && newVal > 0) ? newVal : 1;
                    updateUI();
                    saveToCloud();
                });
                
                inputClient.addEventListener('input', saveToCloud);
                inputMonth.addEventListener('input', saveToCloud);

                btnAdd.addEventListener('click', () => {
                    donePosters++;
                    updateUI();
                    saveToCloud();
                });

                btnSub.addEventListener('click', () => {
                    if (donePosters > 0) {
                        donePosters--;
                        updateUI();
                        saveToCloud();
                    }
                });

                btnDelete.addEventListener('click', () => {
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.95)';
                    card.style.transition = 'all 0.3s ease-out';
                    setTimeout(() => card.remove(), 300);
                });

                container.appendChild(clone);
                lucide.createIcons();
                setTimeout(updateUI, 50);

                if (initialClientName === "") {
                    setTimeout(() => inputClient.focus(), 100);
                }
            }

            // ☁️ --- CHARGEMENT DEPUIS GOOGLE SHEETS (AU DÉMARRAGE) --- ☁️
            async function loadDataFromCloud() {
                if (API_URL === "https://script.google.com/macros/s/AKfycbxrHNApsIPcjh-dyadssqx-ET29YXeAVK7HU6Zoygs2GqIqdS_cDnwWjw3rmAIwKuyg/exec" || API_URL === "https://script.google.com/macros/s/AKfycbxrHNApsIPcjh-dyadssqx-ET29YXeAVK7HU6Zoygs2GqIqdS_cDnwWjw3rmAIwKuyg/exec") {
                    setSyncStatus('error');
                    createClientDashboard("", "Client Démo 1", 12, 30);
                    return;
                }

                try {
                    setSyncStatus('syncing');
                    const response = await fetch(API_URL);
                    const datas = await response.json();
                    
                    if (datas.length === 0) {
                        createClientDashboard();
                    } else {
                        datas.forEach(row => {
                            createClientDashboard(row.id, row.client, row.terminees, row.objectif, row.mois);
                        });
                    }
                    setSyncStatus('success');

                } catch (error) {
                    console.error("Erreur de chargement des données :", error);
                    setSyncStatus('error');
                    alert("Impossible de se connecter à Google Sheets. Vérifiez votre URL API.");
                }
            }

            // --- SAUVEGARDE MANUELLE GLOBALE ---
            document.getElementById('btn-save-all').addEventListener('click', () => {
                if (API_URL === "https://script.google.com/macros/s/AKfycbxrHNApsIPcjh-dyadssqx-ET29YXeAVK7HU6Zoygs2GqIqdS_cDnwWjw3rmAIwKuyg/exec" || API_URL === "") {
                    alert("Veuillez d'abord configurer l'URL de votre API Google Apps Script au début du code.");
                    return;
                }

                setSyncStatus('syncing');
                const cards = document.querySelectorAll('article');
                let promises = [];

                // Parcourt chaque carte pour récupérer ses données actuelles depuis le HTML
                cards.forEach(card => {
                    const dataToSend = {
                        id: card.dataset.id,
                        mois: card.querySelector('.js-input-month').value,
                        client: card.querySelector('.js-input-client').value,
                        objectif: parseInt(card.querySelector('.js-input-target').value) || 30,
                        terminees: parseInt(card.querySelector('.js-val-done').textContent) || 0
                    };

                    // Envoi des requêtes POST pour chaque carte
                    const request = fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(dataToSend)
                    }).then(res => res.json());

                    promises.push(request);
                });

                // Attend que toutes les sauvegardes soient terminées pour afficher "À jour"
                Promise.all(promises)
                    .then(() => {
                        setSyncStatus('success');
                        console.log("Sauvegarde manuelle terminée avec succès.");
                    })
                    .catch(err => {
                        setSyncStatus('error');
                        console.error("Erreur lors de la sauvegarde manuelle :", err);
                    });
            });

            // --- INITIALISATION ---
            loadDataFromCloud();
            
            document.getElementById('btn-add-client').addEventListener('click', () => {
                createClientDashboard();
            });
        });
    </script>
</body>
</html>
